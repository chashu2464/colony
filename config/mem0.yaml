# Mem0 Configuration for Colony

# Vector Store Configuration
vector_store:
  provider: qdrant  # Options: qdrant, chroma, pinecone, weaviate, faiss, milvus
  config:
    host: localhost
    port: 6333
    collection_name: colony_memories
    # For local file-based stores (chroma, faiss):
    # path: ./.mem0/vector_store

# LLM Configuration (for memory extraction)
llm:
  provider: openai  # Options: openai, anthropic, google, ollama, azure_openai
  config:
    model: Pro/MiniMaxAI/MiniMax-M2.5 # gpt-4o-mini  # Cheaper model for memory extraction
    api_key: 81278a2d760345e58c195c6b3346cb81.mwvOxbLu9HxAK8CC
    # Note: Use OPENAI_API_BASE environment variable for custom endpoint

# Embedder Configuration (for vector search)
embedder:
  provider: openai  # Options: openai, huggingface, ollama, azure_openai
  config:
    model: Qwen/Qwen3-Embedding-4B
    api_key: 81278a2d760345e58c195c6b3346cb81.mwvOxbLu9HxAK8CC
    embedding_dims: 1536
    # Note: Use OPENAI_API_BASE environment variable for custom endpoint

# Graph Store Configuration (optional, for entity relationships)
