# Mem0 API Adapter Configuration

# This configuration allows Mem0 to use unofficial/compatible API endpoints
# that follow OpenAI's API format (e.g., local models, third-party providers)

# ============================================================
# LLM Configuration (for memory extraction)
# ============================================================

llm:
  provider: openai  # Keep as 'openai' for API compatibility
  config:
    model: glm-4.7-flashx

    # Custom API endpoint (OpenAI-compatible)
    # Examples:
    # - Local: http://localhost:8000/v1
    # - Third-party: https://api.example.com/v1
    # - Cloudflare Workers AI: https://api.cloudflare.com/client/v4/accounts/{account_id}/ai/v1
    base_url: ${CUSTOM_LLM_BASE_URL:-https://api.openai.com/v1}

    # API key for the custom endpoint
    api_key: ${CUSTOM_LLM_API_KEY}

    # Optional: Custom headers
    # default_headers:
    #   Authorization: "Bearer ${CUSTOM_LLM_API_KEY}"
    #   X-Custom-Header: "value"

    # Optional: Timeout settings
    # timeout: 60
    # max_retries: 3

# ============================================================
# Embedder Configuration (for vector search)
# ============================================================

embedder:
  provider: openai  # Keep as 'openai' for API compatibility
  config:
    model: embedding-3

    # Custom API endpoint (OpenAI-compatible)
    base_url: ${CUSTOM_EMBEDDER_BASE_URL:-https://api.openai.com/v1}

    # API key for the custom endpoint
    api_key: ${CUSTOM_EMBEDDER_API_KEY}

    # Embedding dimensions (must match the model)
    embedding_dims: 1536

    # Optional: Custom headers
    # default_headers:
    #   Authorization: "Bearer ${CUSTOM_EMBEDDER_API_KEY}"

# ============================================================
# Vector Store Configuration
# ============================================================

vector_store:
  provider: qdrant
  config:
    host: ${QDRANT_HOST:-localhost}
    port: ${QDRANT_PORT:-6333}
    collection_name: colony_memories

    # Optional: Qdrant API key (for cloud)
    # api_key: ${QDRANT_API_KEY}
    # url: ${QDRANT_URL}

# ============================================================
# Graph Store Configuration (Optional)
# ============================================================

graph_store:
  provider: neo4j
  config:
    url: ${NEO4J_URL:-bolt://localhost:7687}
    username: ${NEO4J_USERNAME:-neo4j}
    password: ${NEO4J_PASSWORD}

